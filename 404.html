<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="refresh" content="0; url=/" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting…</title>
  </head>
  <body>
    <p>Redirecting to <a href="/">home</a>…</p>
    <script>
      // Single Page App redirect: preserve path for client router
      (function(){
        var redirectTo = '/' + (location.pathname + location.search + location.hash).replace(/^\//,'');
        // If hosted under a custom base, you may need to adjust the above.
        location.replace(redirectTo);
      })();
    </script>
  </body>
  </html>
